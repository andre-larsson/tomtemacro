<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- TomteMacro app icon master. Flat shapes only: must stay legible at 16 px
       and crisp at 1024 px. Edit this file and re-run build-icons.sh; never
       edit the exported PNGs/ico. -->
