name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install X11 build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxtst-dev libxi-dev
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo build --workspace
      - run: cargo test --workspace

  # True inject -> capture -> replay smoke test under a virtual X server.
  # Only Linux can do this headless; Windows/macOS hosted runners can't grant
  # the input permissions, so their runtime QA is manual.
  x11-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install X11 build deps + Xvfb
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxtst-dev libxi-dev xvfb
      - uses: Swatinem/rust-cache@v2
      - run: xvfb-run -a cargo test --workspace -- --ignored
        env:
          TOMTE_FULL_SMOKE: "1"
